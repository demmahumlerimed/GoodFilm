<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#111111"/>

  <!-- Film reel outer ring -->
  <circle cx="32" cy="32" r="22" stroke="#E50914" stroke-width="3" fill="none"/>

  <!-- Film reel center hub -->
  <circle cx="32" cy="32" r="6" fill="#E50914"/>

  <!-- Film reel spokes -->
  <line x1="32" y1="10" x2="32" y2="18" stroke="#E50914" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="46" x2="32" y2="54" stroke="#E50914" stroke-width="3" stroke-linecap="round"/>
  <line x1="10" y1="32" x2="18" y2="32" stroke="#E50914" stroke-width="3" stroke-linecap="round"/>
  <line x1="46" y1="32" x2="54" y2="32" stroke="#E50914" stroke-width="3" stroke-linecap="round"/>

  <!-- Film reel diagonal spokes -->
  <line x1="16.7" y1="16.7" x2="22.3" y2="22.3" stroke="#E50914" stroke-width="3" stroke-linecap="round"/>
  <line x1="41.7" y1="41.7" x2="47.3" y2="47.3" stroke="#E50914" stroke-width="3" stroke-linecap="round"/>
  <line x1="47.3" y1="16.7" x2="41.7" y2="22.3" stroke="#E50914" stroke-width="3" stroke-linecap="round"/>
  <line x1="22.3" y1="41.7" x2="16.7" y2="47.3" stroke="#E50914" stroke-width="3" stroke-linecap="round"/>

  <!-- Perforation holes on reel -->
  <circle cx="32" cy="14" r="2.5" fill="#111111" stroke="#E50914" stroke-width="1.5"/>
  <circle cx="32" cy="50" r="2.5" fill="#111111" stroke="#E50914" stroke-width="1.5"/>
  <circle cx="14" cy="32" r="2.5" fill="#111111" stroke="#E50914" stroke-width="1.5"/>
  <circle cx="50" cy="32" r="2.5" fill="#111111" stroke="#E50914" stroke-width="1.5"/>
</svg>
